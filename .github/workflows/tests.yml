name: tests

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/tests.yml'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Run tool tests
        id: tool-tests
        run: |
          set +e
          make test 2>&1 | tee /tmp/agentplane-pytest.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentplane-pytest-output
          path: /tmp/agentplane-pytest.log

      - name: Fail if tests failed
        run: test "${{ steps.tool-tests.outputs.status }}" = "0"
