name: tests

on:
  push:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'tools/**'
      - 'Makefile'
      - '.github/workflows/tests.yml'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python3 -m pip install pytest

      - name: Run tool tests
        run: make test
