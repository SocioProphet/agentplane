name: runtime-certification-state

on:
  pull_request:
    branches: [ main ]
    paths:
      - "schemas/sandbox/runtime-certification-state.v0.1.schema.json"
      - "tests/fixtures/sandbox/runtime-certification*.json"
      - "tools/validate_runtime_certification_state.py"
      - ".github/workflows/runtime-certification-state.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-runtime-certification-state:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate runtime certification state fixtures
        run: python3 tools/validate_runtime_certification_state.py
